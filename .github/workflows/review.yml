name: AI PR Review
on:
  pull_request:
    types: [opened, synchronize]
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Custom Agent Review
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Authenticate and invoke the custom agent
          # 'reviewer' matches the filename 'reviewer.agent.md'
          copilot -p "Review this PR: ${{ github.event.pull_request.html_url }}. Return only markdown for the review summary." \
            --allow-tool='shell(git:*)' \
            --allow-tool=write \
            --no-ask-user \
            --agent reviewer > raw_summary.md
          
          # Strip everything before "Contract Testing Review"
          sed -n '/## Contract Testing Review/,$p' raw_summary.md > summary.md
          
          # Find existing comment from github-actions bot
          COMMENT_ID=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.user.login=="github-actions[bot]" and (.body | contains("Contract Testing Review"))) | .id' \
            | head -n 1)
          
          # Update existing comment or create new one
          if [ -n "$COMMENT_ID" ]; then
            echo "Updating existing comment $COMMENT_ID"
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
              -f body="$(cat summary.md)"
          else
            echo "Creating new comment"
            gh pr comment "${{ github.event.pull_request.html_url }}" --body-file summary.md
          fi
